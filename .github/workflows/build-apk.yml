name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle assembleDebug --stacktrace --no-daemon 2>&1 | tee build.log
          echo "=== BUILD EXIT CODE: ${PIPESTATUS[0]} ==="
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find and copy APK
        if: always()
        run: |
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null | head -20
          echo "=== Build outputs ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          # Copy any found APK to known location
          mkdir -p app/build/outputs/apk/debug/
          find . -name "*.apk" -type f -exec cp {} app/build/outputs/apk/debug/app-debug.apk \; 2>/dev/null || true
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: uma-ai-assistant-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: warn
