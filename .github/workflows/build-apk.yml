name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          echo "/tmp/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          gradle assembleDebug --stacktrace --no-daemon --offline=false 2>&1 | tee build.log
          echo "=== BUILD EXIT CODE: ${PIPESTATUS[0]} ==="
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: List outputs
        if: always()
        run: |
          echo "=== APK Output ==="
          find app/build/outputs -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== Build dir ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No output dir"
          echo "=== Last 50 lines of build log ==="
          tail -n 50 build.log 2>/dev/null || echo "No log"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: uma-ai-assistant-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
