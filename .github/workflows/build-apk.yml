name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.2/bin/gradle --version

      - name: Clean and Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export GRADLE_USER_HOME=/tmp/gradle-home
          mkdir -p $GRADLE_USER_HOME
          /tmp/gradle-8.2/bin/gradle clean assembleDebug --stacktrace --no-daemon --gradle-user-home=$GRADLE_USER_HOME
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Find APK
        run: |
          echo "=== All APK files ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Outputs structure ==="
          find app/build/outputs -type f 2>/dev/null | head -30
          echo "=== Check debug dir ==="
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "NO debug APK dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: uma-ai-assistant-debug
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30
          if-no-files-found: warn
