name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.2/bin/gradle --version

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export GRADLE_USER_HOME=/tmp/gradle-home
          mkdir -p $GRADLE_USER_HOME
          /tmp/gradle-8.2/bin/gradle clean assembleDebug --stacktrace --no-daemon --gradle-user-home=$GRADLE_USER_HOME 2>&1 | tee /tmp/build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Extract errors
        if: always()
        run: |
          echo "=== Gradle exit: ${{ env.EXIT_CODE }} ===" | tee /tmp/build_errors.txt
          echo "=== LAST 100 LINES ===" | tee -a /tmp/build_errors.txt
          tail -n 100 /tmp/build.log | tee -a /tmp/build_errors.txt
          echo "=== COMPILER ERRORS ===" | tee -a /tmp/build_errors.txt
          grep -n "error:\|e: \|* What went wrong\|FAIL\|FAILED\|cannot find" /tmp/build.log | tee -a /tmp/build_errors.txt || true

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build_errors.txt
          retention-days: 5

      - name: Upload APK
        if: env.EXIT_CODE == '0'
        uses: actions/upload-artifact@v4
        with:
          name: uma-ai-assistant-debug
          path: app/build/outputs/apk/**/*.apk
          retention-days: 30
