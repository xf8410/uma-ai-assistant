name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Install build tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Download and install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/
          /tmp/gradle-8.2/bin/gradle --version

      - name: Compile Kotlin Only
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export GRADLE_USER_HOME=/tmp/gradle-home
          mkdir -p $GRADLE_USER_HOME
          /tmp/gradle-8.2/bin/gradle compileDebugKotlin --stacktrace --no-daemon --gradle-user-home=$GRADLE_USER_HOME 2>&1 | tail -n 50
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Full Build (APK)
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export GRADLE_USER_HOME=/tmp/gradle-home
          /tmp/gradle-8.2/bin/gradle assembleDebug --stacktrace --no-daemon --gradle-user-home=$GRADLE_USER_HOME 2>&1 | tail -n 30
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: uma-ai-assistant-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
